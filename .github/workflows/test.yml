name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  back:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: back/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
