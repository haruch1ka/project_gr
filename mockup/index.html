<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>上達ノート モック</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="phone">

  <!-- ══════════════════════════════════
       ホーム画面
  ══════════════════════════════════ -->
  <div class="screen active" id="home">
    <div class="header">
      <div class="header-title">上達ノート</div>
    </div>
    <div class="fields-grid">
      <div class="field-card" onclick="goTo('record')">
        <div class="field-icon">🎣</div>
        <div class="field-name">釣り</div>
      </div>
      <div class="field-card" onclick="goTo('record')">
        <div class="field-icon">💪</div>
        <div class="field-name">筋トレ</div>
      </div>
      <div class="field-card" onclick="goTo('record')">
        <div class="field-icon">📖</div>
        <div class="field-name">読書</div>
      </div>
      <div class="field-card add-card">
        <div class="add-plus">＋</div>
        <div class="add-label">追加</div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       記録画面
  ══════════════════════════════════ -->
  <div class="screen" id="record">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <div class="header-title">釣り</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="goTo('web')">🔍</button>
        <button class="btn-icon" onclick="goTo('chat')">💬</button>
        <button class="btn-icon" onclick="goTo('knowledge')">📚</button>
        <button class="btn-icon" onclick="goTo('plan')">📋</button>
      </div>
    </div>

    <div class="recent-logs">
      <div class="recent-logs-title">最近の記録</div>
      <div class="log-item">
        <span class="log-date">6/3</span>
        <span class="log-text">朝マズメ、大物バラした。タモを先に準備すべきだった</span>
      </div>
      <div class="log-item">
        <span class="log-date">6/2</span>
        <span class="log-text">夕マズメ、アジ連続ヒット。レンジ中層が正解だった</span>
      </div>
      <div class="log-item">
        <span class="log-date">6/1</span>
        <span class="log-text">風強すぎて釣りにならず。早上がり</span>
      </div>
      <div class="log-item">
        <span class="log-date">5/30</span>
        <span class="log-text">新しいルアー試したが反応なし。カラーを変えてみる</span>
      </div>
    </div>

    <div class="record-form">
      <div>
        <div class="form-label">メモ</div>
        <textarea class="memo-input" id="memoInput" placeholder="今日の気づき、結果、次に試したいことなど…"></textarea>
      </div>
      <button class="btn-save" onclick="saveRecord()">保存する</button>
    </div>
  </div>

  <!-- ══════════════════════════════════
       知識画面（カテゴリ一覧）
  ══════════════════════════════════ -->
  <div class="screen" id="knowledge">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <div class="header-title">釣り</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="goTo('web')">🔍</button>
        <button class="btn-icon" onclick="goTo('chat')">💬</button>
        <button class="btn-icon active" onclick="goTo('knowledge')">📚</button>
        <button class="btn-icon" onclick="goTo('plan')">📋</button>
      </div>
    </div>
    <div class="link-list">
      <div class="link-item" onclick="goToCategory('タイミング')">タイミング</div>
      <div class="link-item" onclick="goToCategory('道具・仕掛け')">道具・仕掛け</div>
      <div class="link-item" onclick="goToCategory('場所')">場所</div>
      <div class="link-item" onclick="goToCategory('まだわからないこと')">まだわからないこと</div>
      <div class="link-item add-link">＋</div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       知識画面（カテゴリ内・項目一覧）
  ══════════════════════════════════ -->
  <div class="screen" id="knowledge-category">
    <div class="header">
      <button class="btn-back" onclick="goTo('knowledge')">←</button>
      <div class="header-title" id="category-title"></div>
    </div>
    <div class="link-list" id="category-items"></div>
  </div>

  <!-- ══════════════════════════════════
       知識画面（項目詳細）
  ══════════════════════════════════ -->
  <div class="screen" id="knowledge-item">
    <div class="header">
      <button class="btn-back" id="item-back-btn">←</button>
      <div class="header-title" id="item-title"></div>
    </div>
    <div class="item-detail">
      <div class="item-notes" id="item-notes"></div>
      <div class="item-add">メモを追加…</div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       AI対話画面（プレースホルダー）
  ══════════════════════════════════ -->
  <div class="screen" id="chat">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <div class="header-title">釣り</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="goTo('web')">🔍</button>
        <button class="btn-icon active" onclick="goTo('chat')">💬</button>
        <button class="btn-icon" onclick="goTo('knowledge')">📚</button>
        <button class="btn-icon" onclick="goTo('plan')">📋</button>
      </div>
    </div>
    <div class="placeholder">
      <div class="placeholder-icon">💬</div>
      <div class="placeholder-text">AI対話</div>
      <div class="placeholder-sub">経験と知識を文脈にAIと対話する</div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       Web収集画面（プレースホルダー）
  ══════════════════════════════════ -->
  <div class="screen" id="web">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <div class="header-title">釣り</div>
      <div class="header-actions">
        <button class="btn-icon active" onclick="goTo('web')">🔍</button>
        <button class="btn-icon" onclick="goTo('chat')">💬</button>
        <button class="btn-icon" onclick="goTo('knowledge')">📚</button>
        <button class="btn-icon" onclick="goTo('plan')">📋</button>
      </div>
    </div>
    <div class="placeholder">
      <div class="placeholder-icon">🔍</div>
      <div class="placeholder-text">Web情報収集</div>
      <div class="placeholder-sub">Web情報を仮説として知識プールへ投入する</div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       プラン画面（プレースホルダー）
  ══════════════════════════════════ -->
  <div class="screen" id="plan">
    <div class="header">
      <button class="btn-back" onclick="goTo('home')">←</button>
      <div class="header-title">釣り</div>
      <div class="header-actions">
        <button class="btn-icon" onclick="goTo('web')">🔍</button>
        <button class="btn-icon" onclick="goTo('chat')">💬</button>
        <button class="btn-icon" onclick="goTo('knowledge')">📚</button>
        <button class="btn-icon active" onclick="goTo('plan')">📋</button>
      </div>
    </div>
    <div class="placeholder">
      <div class="placeholder-icon">📋</div>
      <div class="placeholder-text">行動プラン</div>
      <div class="placeholder-sub">AI対話から生成された次の行動プラン</div>
    </div>
  </div>

  <div class="toast" id="toast">保存しました</div>

</div>
<script src="js/app.js"></script>
</body>
</html>
